[project]
name = "nowpy-servicenow-mcp"
version = "0.1.0"
description = "Python MCP server for reading ServiceNow data and creating common ServiceNow script artifacts."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27,<1",
    "mcp[cli]>=1.27,<2",
]

[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
